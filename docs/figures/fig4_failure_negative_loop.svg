<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="950" viewBox="0 0 1600 950">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #d6dbe6; stroke-width: 2; rx: 14; }
      .box { fill: #ffffff; stroke: #263244; stroke-width: 2; rx: 10; }
      .fail { fill: #fff0f0; stroke: #b33a3a; }
      .data { fill: #effaf3; stroke: #2c7a4b; }
      .model { fill: #f3efff; stroke: #6b4cc2; }
      .decision { fill: #fff6e8; stroke: #b76a12; }
      .title { font: 700 34px Arial, "Microsoft YaHei", sans-serif; fill: #1f2937; }
      .subtitle { font: 400 18px Arial, "Microsoft YaHei", sans-serif; fill: #4b5563; }
      .label { font: 700 22px Arial, "Microsoft YaHei", sans-serif; fill: #1f2937; }
      .text { font: 400 17px Arial, "Microsoft YaHei", sans-serif; fill: #374151; }
      .small { font: 400 14px Arial, "Microsoft YaHei", sans-serif; fill: #4b5563; }
      .arrow { stroke: #374151; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 8 6; }
      .stone { fill: #c8b79c; stroke: #55483a; stroke-width: 2; }
      .bad { fill: #e88f8f; stroke: #8b1e1e; stroke-width: 2; opacity: 0.78; }
      .good { fill: #8bcf9d; stroke: #23633a; stroke-width: 2; opacity: 0.82; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#374151"/>
    </marker>
  </defs>

  <rect class="bg" width="1600" height="950"/>
  <text class="title" x="60" y="62">Figure 4. 失败案例如何变成负样本：不是失败就丢弃，而是进入学习闭环</text>
  <text class="subtitle" x="60" y="94">本轮 v10 网络闭环失败没有被删除；图像、日志、candidate pose 和 placement 标签全部进入 v11 数据集。</text>

  <rect class="panel" x="50" y="125" width="1500" height="770"/>

  <rect class="box fail" x="95" y="170" width="385" height="250"/>
  <text class="label" x="125" y="210">典型失败：v10 risk-adjusted top-2</text>
  <text class="text" x="125" y="245">stable/failure = 8/16</text>
  <text class="text" x="125" y="275">RMSE = 0.4986 m</text>
  <text class="text" x="125" y="305">drift = 0.2281 m</text>
  <text class="text" x="125" y="335">问题：网络裁剪过强，互锁候选被删</text>
  <g transform="translate(150,355)">
    <rect class="stone" x="0" y="35" width="60" height="28" transform="rotate(-8 30 49)"/>
    <rect class="bad" x="70" y="10" width="58" height="28" transform="rotate(18 99 24)"/>
    <rect class="stone" x="140" y="38" width="62" height="28" transform="rotate(-4 171 52)"/>
    <rect class="bad" x="220" y="-3" width="58" height="28" transform="rotate(27 249 11)"/>
    <rect class="good" x="38" y="72" width="74" height="30" transform="rotate(5 75 87)"/>
    <rect class="bad" x="150" y="82" width="68" height="30" transform="rotate(-19 184 97)"/>
  </g>

  <rect class="box data" x="600" y="170" width="360" height="250"/>
  <text class="label" x="630" y="210">失败记录</text>
  <text class="text" x="630" y="245">state.npz：最终物理状态</text>
  <text class="text" x="630" y="275">candidate_pose_log.csv：所有候选</text>
  <text class="text" x="630" y="305">failure_cases.csv：失败原因</text>
  <text class="text" x="630" y="335">RGB / depth / object_depth</text>
  <text class="small" x="630" y="375">包括正视图和俯视图深度图</text>

  <rect class="box data" x="1080" y="170" width="365" height="250"/>
  <text class="label" x="1110" y="210">v11 数据集</text>
  <text class="text" x="1110" y="245">run dirs: 23</text>
  <text class="text" x="1110" y="275">placement: 659</text>
  <text class="text" x="1110" y="305">candidate pose: 22404</text>
  <text class="text" x="1110" y="335">middle failure: 172</text>
  <text class="text" x="1110" y="365">cap failure: 51</text>

  <rect class="box model" x="255" y="540" width="350" height="220"/>
  <text class="label" x="285" y="580">重训小网络</text>
  <text class="text" x="285" y="615">Support-map CNN v10</text>
  <text class="text" x="285" y="645">PoseRisk v8 / v8b</text>
  <text class="text" x="285" y="675">WallStateCritic v10</text>
  <text class="small" x="285" y="720">评价：离线指标 + 闭环 MuJoCo 双重检查</text>

  <rect class="box decision" x="765" y="540" width="360" height="220"/>
  <text class="label" x="795" y="580">科学判断</text>
  <text class="text" x="795" y="615">若闭环提升：进入默认策略</text>
  <text class="text" x="795" y="645">若闭环退化：保留为负样本</text>
  <text class="text" x="795" y="675">记录失败机制，调整网络目标</text>
  <text class="small" x="795" y="720">本轮结论：v5 PoseRisk 和 v4 support-map 仍保留</text>

  <rect class="box decision" x="1260" y="540" width="210" height="220"/>
  <text class="label" x="1290" y="580">下一步</text>
  <text class="text" x="1290" y="615">互锁 critic</text>
  <text class="text" x="1290" y="645">后续可支撑性</text>
  <text class="text" x="1290" y="675">middle/cap 加权</text>
  <text class="text" x="1290" y="705">candidates 5-6</text>

  <path class="arrow" d="M480 295 H600"/>
  <path class="arrow" d="M960 295 H1080"/>
  <path class="arrow" d="M1260 420 C1260 510 605 500 515 540"/>
  <path class="arrow" d="M605 650 H765"/>
  <path class="arrow" d="M1125 650 H1260"/>
  <path class="arrow dash" d="M1365 540 C1365 455 305 485 305 420"/>

  <rect x="110" y="800" width="1320" height="58" fill="#fbfbfd" stroke="#d6dbe6" stroke-width="2" rx="10"/>
  <text class="text" x="140" y="836">记录原则：失败不是坏结果；只要完整保存 candidate、state、RGB-D 和指标，它就能告诉我们“以后不要走哪条路”。</text>
</svg>
